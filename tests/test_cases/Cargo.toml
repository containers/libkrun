[package]
name = "test_cases"
edition = "2021"

[features]
# "host" means host-side code (as opposed to guest-side).
# Enable exactly one of "native" or "cdylib" to choose the linking mode.
# "native" is the default (implied by "host" for backwards compat with runner).
host = ["native"]
native = ["dep:krun"]
cdylib = ["dep:krun-cdylib"]
guest = []

[lib]
name = "test_cases"

[dependencies]
krun = { package = "libkrun", path = "../../src/libkrun", optional = true }
krun-cdylib = { package = "libkrun-via-cdylib", path = "../../src/libkrun-via-cdylib", optional = true }
macros = { path = "../macros" }
nix = { version = "0.29.0", features = ["fs", "socket", "ioctl"] }
anyhow = "1.0.95"
tempdir = "0.3.7"
log = "0.4"
